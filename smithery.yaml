name: amazon-intel-mcp
displayName: Amazon Competitive Intelligence
description: |
  Amazon product research & competitive intelligence for AI assistants.
  Search products, analyze BSR trends, compare competitors, track pricing history,
  and estimate keyword demand. Powered by PA-API 5.0 + Keepa.

  Free tier: 10 calls/day. Unlimited access: $9/month → https://buy.stripe.com/4gM3cw8Dz28qcAYdHJaEE00
version: 1.0.0
license: MIT
categories:
  - ecommerce
  - business
  - research
tags:
  - amazon
  - ecommerce
  - bsr
  - competitive-intelligence
  - product-research
  - keepa
  - fba
startCommand:
  type: http
  url: https://amazon-intel-mcp-production.up.railway.app/mcp
  configSchema:
    type: object
    properties:
      amazonAccessKey:
        type: string
        title: Amazon Access Key (Required)
        description: "PA-API 5.0 access key from Amazon Associates"
      amazonSecretKey:
        type: string
        title: Amazon Secret Key (Required)
        description: "PA-API 5.0 secret key"
      amazonPartnerTag:
        type: string
        title: Amazon Partner Tag (Required)
        description: "Your Associates partner tag (e.g. mytag-20)"
      keepaApiKey:
        type: string
        title: Keepa API Key (Optional)
        description: "Required for BSR history and best sellers. Get at keepa.com"
      apiKey:
        type: string
        title: API Key — Unlimited Access ($9/month)
        description: "Free tier: 10 calls/day. Remove limit with a paid key → https://buy.stripe.com/4gM3cw8Dz28qcAYdHJaEE00"
    required:
      - amazonAccessKey
      - amazonSecretKey
      - amazonPartnerTag
  exampleConfig:
    amazonAccessKey: "AKIAIOSFODNN7EXAMPLE"
    amazonSecretKey: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
    amazonPartnerTag: "mystore-20"
    apiKey: "km_your_key_here"
